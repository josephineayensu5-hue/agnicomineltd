<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard | AgnicoMine Ltd</title>

    <link rel="icon" href="Agnico_Eagle_Logo.svg.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0b1e2d, #1a2f45);
            margin: 0;
        }

        header {
            background: linear-gradient(90deg, #0b1e2d, gold);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .profile, .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .profile {
            text-align: center;
        }

        .profile img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid gold;
        }

        h3 {
            border-left: 5px solid gold;
            padding-left: 10px;
        }

        .amount {
            font-size: 26px;
            color: gold;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress {
            width: 90%;
            background: linear-gradient(90deg, gold, orange);
            padding: 10px;
            text-align: center;
            border-radius: 20px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, gold, orange);
            border: none;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #finalMessage {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    AgnicoMine Ltd — Client Dashboard
</header>

<div class="container">

    <div class="profile">
        <img src="5972031757873778049.jpg">
        <h2>David Overstreet</h2>
        <p style="color:green;font-weight:bold;">Verified Account</p>
    </div>

    <div class="card">
        <h3>Estimated Value</h3>
        <p class="amount">$6,000,000</p>
    </div>

    <div class="card">
        <h3>Process Status</h3>

        <div class="progress-bar">
            <div class="progress">90% Complete</div>
        </div>

        <ul>
            <li>Ownership Verified ✅</li>
            <li>Insurance Processed ✅</li>
            <li>Final Step Pending ⏳</li>
        </ul>
    </div>

    <div class="card">
        <h3>Deposit Information</h3>

        <input value="David Overstreet" readonly>
        <input value="Tucson Federal Credit Union" readonly>
        <input value="42435 Tucson, AZ 85733" readonly>
    </div>

    <div class="card">
        <h3>Next Step</h3>
        <button onclick="requestCheque()">Proceed with Final Processing</button>
        <p id="finalMessage"></p>
    </div>

</div>

<script>
function requestCheque() {
    const msg = document.getElementById("finalMessage");

    msg.style.color = "red";
    msg.innerText = "Further action is required. Please contact support for assistance.";
}
</script>

</body>
</html>
